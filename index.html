<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance Times Unified Index</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 2rem 1rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { margin-bottom: 2rem; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; font-size: 2.2rem; }
        p { color: #64748b; }

        /* Search Bar & Stats */
        .controls { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        input[type="text"] { width: 100%; padding: 0.8rem 1.2rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; transition: border 0.2s; }
        input[type="text"]:focus { border-color: var(--accent); }
        .stats-badge { background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 600; font-size: 0.95rem; }

        /* Athlete Card Styles */
        .athlete-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); margin-bottom: 1.5rem; overflow: hidden; }
        .athlete-header { background: #f1f5f9; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .athlete-name { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .count-tag { background: var(--accent); color: white; font-size: 0.8rem; font-weight: bold; padding: 0.2rem 0.6rem; border-radius: 20px; }

        /* Data Tables */
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th, td { padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); }
        th { background: #fafafa; font-weight: 600; color: #475569; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f8fafc; }

        /* Alert and Loading States */
        .loader { text-align: center; padding: 3rem; font-size: 1.2rem; font-weight: 500; color: var(--accent); }
        .error-banner { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #fca5a5; }
        
        @media (max-width: 768px) {
            .controls { grid-template-columns: 1fr; }
            th, td { padding: 0.5rem 0.75rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Distance Times Master Index</h1>
        <p>One-Stop Shop for Live Track & Field Logs and Historical Cross Country Sheets</p>
    </header>

    <div id="error-container"></div>

    <div class="controls">
        <input type="text" id="search-input" placeholder="Search athletes, years, or meets (e.g., Justus Detter, 2025, GlenOak)..." disabled>
        <div class="stats-badge" id="stats-counter">Loading Records...</div>
    </div>

    <div id="main-content">
        <div class="loader">Synchronizing data indices and running 5K validation layers...</div>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION BLOCK ---
    // Swapping these variables updates the index's sources.
    const SOURCE_DOCUMENTS = {
        trackDoc1: 'YOUR_TRACK_DOC_1_CSV_URL',
        trackDoc2: 'YOUR_TRACK_DOC_2_CSV_URL',
        trackDoc3: 'YOUR_TRACK_DOC_3_CSV_URL',
        trackDoc4: 'YOUR_TRACK_DOC_4_CSV_URL',
        // The newly incorporated, published 5K spreadsheet:
        historicalXC: 'YOUR_PUBLISHED_BOYS_XC_SPREADSHEET_CSV_URL' 
    };

    // Global memory footprint for index processing
    let MASTER_INDEX = [];

    // --- 2. INITIALIZATION ROUTINE ---
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            await bootstrapIndex();
            initializeSearch();
        } catch (err) {
            showError(`Critical error compiling core data feeds: ${err.message}`);
        }
    });

    // --- 3. DATA PROCESSING ENGINE ---
    async function bootstrapIndex() {
        const fetchPromises = [];

        // Queuing up your first 4 track documents
        ['trackDoc1', 'trackDoc2', 'trackDoc3', 'trackDoc4'].forEach(key => {
            if(SOURCE_DOCUMENTS[key] && !SOURCE_DOCUMENTS[key].includes('YOUR_')) {
                fetchPromises.push(fetchCSV(SOURCE_DOCUMENTS[key], 'Standard Feed'));
            }
        });

        // Queuing up the newly added historical XC sheets matrix
        if(SOURCE_DOCUMENTS.historicalXC && !SOURCE_DOCUMENTS.historicalXC.includes('YOUR_')) {
            fetchPromises.push(fetchHistoricalXC(SOURCE_DOCUMENTS.historicalXC));
        }

        if(fetchPromises.length === 0) {
            // Mocking structural validation schema data for standalone demo functionality
            generateDemoData();
        } else {
            const structures = await Promise.all(fetchPromises);
            MASTER_INDEX = structures.flat();
        }

        // Sort globally by Year descending, then Time ascending
        MASTER_INDEX.sort((a, b) => b.year - a.year || String(a.time).localeCompare(String(b.time)));
        
        updateSystemStats();
    }

    // Standard Document Parser
    async function fetchCSV(url, type) {
        const response = await fetch(url);
        const text = await response.text();
        return parseStandardCSV(text, type);
    }

    // Historical Sheet Pipeline: Maps multi-season grids down to the Master Index
    async function fetchHistoricalXC(url) {
        const response = await fetch(url);
        const text = await response.text();
        
        let compiledRows = [];
        const lines = text.split(/\r?\n/);
        if (lines.length < 2) return [];

        // Parse header array to isolate tracking columns
        const headers = parseCSVLine(lines[0]);
        
        // Tab Extraction: Assume year derived internally via target data mappings or individual feed layers
        let defaultYear = new Date().getFullYear() - 1; // Falling back dynamically to 2025 structure

        for(let i = 1; i < lines.length; i++) {
            if(!lines[i].trim()) continue;
            const row = parseCSVLine(lines[i]);
            let rawName = row[0] || '';
            
            if(!rawName || rawName.toLowerCase().includes('meet') || rawName.toLowerCase().includes('date')) continue;

            // Step A: Name Cleanser - Stripping out '/11', '/12' etc.
            let cleanName = rawName.split('/')[0].trim();

            // Iterate across meet metadata columns
            for(let j = 1; j < row.length; j++) {
                let meetName = headers[j] || `Meet Column ${j}`;
                let rawTime = (row[j] || '').trim();

                // Step B: Filter out non-running values (DNR, DNF, Empty)
                if(!rawTime || ['dnr', 'dnf', 'dns', '-'].includes(rawTime.toLowerCase())) continue;

                // Step C: 3200m Smart Filter Protection Gateway
                if (isTooFastFor5K(rawTime, 13, 30)) {
                    // Logic gate drops short courses/3200m runs automatically
                    continue; 
                }

                compiledRows.push({
                    athlete: cleanName,
                    year: defaultYear,
                    meet: meetName,
                    time: rawTime,
                    type: '5K (XC)',
                    source: 'Historical Sheets'
                });
            }
        }
        return compiledRows;
    }

    // Time Parser: Evaluates whether time string checks in faster than threshold bounds
    function isTooFastFor5K(timeStr, limitMins, limitSecs) {
        const parts = timeStr.replace(/[^0-9:]/g, '').split(':');
        if(parts.length < 2) return false;
        
        const minutes = parseInt(parts[0], 10);
        const seconds = parseFloat(parts[1]);
        
        const totalSeconds = (minutes * 60) + seconds;
        const cutoffSeconds = (limitMins * 60) + limitSecs;
        
        return totalSeconds < cutoffSeconds;
    }

    function parseStandardCSV(text, sourceType) {
        const lines = text.split(/\r?\n/);
        let entries = [];
        // Generic tracking fallback parsing schema
        for(let i = 1; i < lines.length; i++) {
            const columns = parseCSVLine(lines[i]);
            if(columns.length < 4) continue;
            entries.push({
                athlete: columns[0].split('/')[0].trim(),
                year: parseInt(columns[1]) || 2026,
                meet: columns[2],
                time: columns[3],
                type: columns[4] || 'Distance Item',
                source: sourceType
            });
        }
        return entries;
    }

    function parseCSVLine(line) {
        let arr = [];
        let quote = false;
        let cell = '';
        for (let i = 0; i < line.length; i++) {
            let char = line[i];
            if (char === '"') { quote = !quote; }
            else if (char === ',' && !quote) { arr.push(cell.trim()); cell = ''; }
            else { cell += char; }
        }
        arr.push(cell.trim());
        return arr;
    }

    // Pre-populating index structural view with mock logic if shared keys are initial 
    function generateDemoData() {
        MASTER_INDEX = [
            { athlete: "Justus Detter", year: 2025, meet: "Federal League Meet", time: "15:49", type: "5K (XC)", source: "Historical Sheets" },
            { athlete: "Justus Detter", year: 2025, meet: "Ashland Invitational", time: "15:50", type: "5K (XC)", source: "Historical Sheets" },
            { athlete: "Jayden Simonson", year: 2025, meet: "GlenOak Invitational", time: "16:27", type: "5K (XC)", source: "Historical Sheets" },
            { athlete: "Jayden Simonson", year: 2025, meet: "Federal League Meet", time: "16:03", type: "5K (XC)", source: "Historical Sheets" },
            { athlete: "Liam Hogan", year: 2025, meet: "GlenOak Invitational", time: "18:40", type: "5K (XC)", source: "Historical Sheets" },
            { athlete: "Justus Detter", year: 2026, meet: "Stark County Indoor Champ", time: "2:08.06", type: "800m (Track)", source: "Track Feed 1" },
            { athlete: "Jayden Simonson", year: 2026, meet: "Dave Clegg Invitational", time: "2:14.21", type: "800m (Track)", source: "Track Feed 2" }
        ];
    }

    // --- 4. INTERFACE ENGINE ---
    function renderView(records) {
        const container = document.getElementById('main-content');
        if (records.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding: 3rem; color: #64748b;">No indexed times found matching query criteria.</div>';
            return;
        }

        // Group index properties by Athlete
        const grouped = records.reduce((acc, obj) => {
            if (!acc[obj.athlete]) acc[obj.athlete] = [];
            acc[obj.athlete].push(obj);
            return acc;
        }, {});

        let htmlGrid = '';
        for (const athleteName in grouped) {
            const logs = grouped[athleteName];
            htmlGrid += `
                <div class="athlete-card">
                    <div class="athlete-header">
                        <span class="athlete-name">${athleteName}</span>
                        <span class="count-tag">${logs.length} performance record(s)</span>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Year</th>
                                    <th>Event / Meet</th>
                                    <th>Time Record</th>
                                    <th>Classification</th>
                                    <th>Data Stream</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${logs.map(log => `
                                    <tr>
                                        <td><strong>${log.year}</strong></td>
                                        <td>${log.meet}</td>
                                        <td style="font-family: monospace; font-size: 1.05rem; font-weight: 600; color: var(--accent);">${log.time}</td>
                                        <td>${log.type}</td>
                                        <td style="color: #94a3b8; font-size: 0.8rem;">${log.source}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        container.innerHTML = htmlGrid;
    }

    function initializeSearch() {
        const searchInput = document.getElementById('search-input');
        searchInput.disabled = false;
        
        // Initial compilation dump display
        renderView(MASTER_INDEX);

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if(!query) {
                renderView(MASTER_INDEX);
                updateSystemStats(MASTER_INDEX.length);
                return;
            }

            const filtered = MASTER_INDEX.filter(r => 
                r.athlete.toLowerCase().includes(query) ||
                r.meet.toLowerCase().includes(query) ||
                r.year.toString().includes(query) ||
                r.type.toLowerCase().includes(query)
            );
            
            renderView(filtered);
            updateSystemStats(filtered.length, true);
        });
    }

    function updateSystemStats(count = MASTER_INDEX.length, isSearching = false) {
        const counter = document.getElementById('stats-counter');
        counter.innerText = isSearching ? `Found ${count} Entries` : `Total Records Indexed: ${count}`;
    }

    function showError(msg) {
        document.getElementById('error-container').innerHTML = `<div class="error-banner">${msg}</div>`;
        const main = document.getElementById('main-content');
        if(main) main.innerHTML = '';
    }
</script>

</body>
</html>
