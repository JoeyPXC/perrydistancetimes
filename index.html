<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    
    <!-- FAVICON LINK: This uses your existing logo image for the browser tab -->
    <link rel="icon" type="image/x-icon" href="logo.png">

    <style>
        /* CSS Variables */
        :root {
            --primary: #121212;
            --accent: #ffd700;
            --background: #1a1a1a;
            --surface: #242424;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
        }

        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.5;
        }

        /* Premium Header Styling */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 12px 16px; /* Tightened vertical empty space */
            text-align: center; 
            border-bottom: 4px solid var(--accent); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; /* Reduced gap between logo and text */
            position: relative; 
        }

        .logo-img { 
            max-width: 155px; /* Boosted logo size */
            height: auto; 
            display: block; 
            margin-bottom: -2px; /* Pulls the text closer to the logo base */
        }

        header h1 { 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            color: #ffffff; 
            margin-top: 0; /* Strips browser default margins */
        }

        /* Main Layout Content */
        main {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 16px;
        }

        .leaderboard-card {
            background: var(--surface);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }

        .player-row:last-child {
            border-bottom: none;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank {
            font-weight: bold;
            color: var(--accent);
            width: 24px;
        }

        .name {
            font-weight: 500;
        }

        .score {
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <header>
        <!-- Your logo image -->
        <img src="logo.png" alt="Logo" class="logo-img">
        <h1>Leaderboard</h1>
    </header>

    <main>
        <div class="leaderboard-card">
            <!-- Sample Data Rows -->
            <div class="player-row">
                <div class="player-info">
                    <span class="rank">1</span>
                    <span class="name">Player One</span>
                </div>
                <span class="score">2,500</span>
            </div>
            <div class="player-row">
                <div class="player-info">
                    <span class="rank">2</span>
                    <span class="name">Player Two</span>
                </div>
                <span class="score">2,100</span>
            </div>
            <div class="player-row">
                <div class="player-info">
                    <span class="rank">3</span>
                    <span class="name">Player Three</span>
                </div>
                <span class="score">1,850</span>
            </div>
        </div>
    </main>

</body>
</html>
